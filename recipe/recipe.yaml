schema_version: 1

context:
  name: aiomqtt
  version: "2.5.1"

package:
  name: ${{ name }}
  version: ${{ version }}
  
source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 25a0a47d157e8f158d2da1110ea4786c0615518751e94f7b04976c977a8ff20d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - paho-mqtt >=2.1.0,<3.0.0
    - typing_extensions >=4.4.0,<5.0.0

tests:
  - package_contents:
      strict: true
      files:
        - site-packages/aiomqtt/__init__.py
        - site-packages/aiomqtt/client.py
        - site-packages/aiomqtt/exceptions.py
        - site-packages/aiomqtt/message.py
        - site-packages/aiomqtt/py.typed
        - site-packages/aiomqtt/topic.py
        - site-packages/aiomqtt/types.py
        - site-packages/aiomqtt-2.4.0.dist-info/INSTALLER
        - site-packages/aiomqtt-2.4.0.dist-info/METADATA
        - site-packages/aiomqtt-2.4.0.dist-info/RECORD
        - site-packages/aiomqtt-2.4.0.dist-info/REQUESTED
        - site-packages/aiomqtt-2.4.0.dist-info/WHEEL
        - site-packages/aiomqtt-2.4.0.dist-info/direct_url.json
        - site-packages/aiomqtt-2.4.0.dist-info/licenses/LICENSE
        # Tests artifacts
        - etc/conda/test-files/aiomqtt/*
  - python:
      imports:
        - aiomqtt
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - pytest --strict-config --strict-markers tests
    files:
      source:
        - tests/
        - pyproject.toml
    requirements:
      run:
        - anyio >=3.6.2,<4.0.0
        - furo >=2023.3.27,<2024.0.0
        - myst-parser >=1.0.0,<2.0.0
        - pytest >=7.3.1,<8.0.0

about:
  homepage: https://github.com/empicano/aiomqtt
  summary: The idiomatic asyncio MQTT client
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - nerohmot
    - MementoRC
    
